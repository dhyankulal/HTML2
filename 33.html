<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="input1" type="text">
    <button id="button1">submit</button>
    <table id="table1">

    </table>
    <script>
        let in1 = document.getElementById("input1");
        let btn1 = document.getElementById("button1");
        let tbl1 = document.getElementById("table1");
        const space = "-";

        btn1.onclick = function ding() {
            for (let i = 0; i < in1.value.length; i++) {
                tbl1.innerHTML += `<p>${space.repeat(10 - i)}${in1.value.slice(0, (2 * i - 1))}</p>`;
            }
        }
    </script>
</body>

</html>
