<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .light {
            background-color: #d18b47;

        .dark {

        }

        td {
            text-align: center;
            font-size: 2rem;
            width: 60px;
            height: 60px;
        }

        table {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td class="light">&#9820</td>
            <td class="dark">&#9822</td>
            <td class="light">&#9821</td>
            <td class="dark">&#9818</td>
            <td class="light">&#9819</td>
            <td class="dark">&#9821</td>
            <td class="light">&#9822</td>
            <td class="dark">&#9820</td>
        </tr>
        <tr>
            <td class="dark">&#9823</td>
            <td class="light">&#9823</td>
            <td class="dark">&#9823</td>
            <td class="light">&#9823</td>
            <td class="dark">&#9823</td>
            <td class="light">&#9823</td>
            <td class="dark">&#9823</td>
            <td class="light">&#9823</td>
        </tr>
        <tr>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
        </tr>
        <tr>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
        </tr>
        <tr>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark" id="id2"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
        </tr>
        <tr>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
            <td class="dark"></td>
            <td class="light"></td>
        </tr>
        <tr>
            <td class="light">&#9817</td>
            <td class="dark">&#9817</td>
            <td class="light">&#9817</td>
            <td class="dark" id="id1">&#9817</td>

            <td class="dark">&#9817</td>
            <td class="light">&#9817</td>
            <td class="dark">&#9817</td>
        </tr>
        <tr>
            <td class="dark">&#9814</td>
            <td class="light">&#9816</td>

            <td class="light">&#9812</td>
            <td class="dark">&#9813</td>
            <td class="light">&#9815</td>
            <td class="dark">&#9816</td>
            <td class="light">&#9814</td>
        </tr>
    </table>
    <audio src="sci-fi.wav" id="id3"></audio>
    <button id="button1">Next</button>
    <script>
        let btn1 = document.getElementById("button1");
        let sound1 = document.getElementById("id3");
        btn1.onclick = function nextMove() {
            document.getElementById("id1").innerHTML = "";
            document.getElementById("id2").innerHTML = "&#9817";
            sound1.play();
        }

    </script>
</body>

</html>
