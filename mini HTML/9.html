<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tic-Tac-Toe</title>
    <style>
        /* Basic styling for the game board */
        td,
        button {
            border: 4px solid black;
            height: 60px;
            width: 60px;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            background-color: #f0f0f0;
        }

        table {
            border-collapse: collapse;
            margin: 20px auto;
        }

        #ans {
            text-align: center;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td><button onclick="ding(1)" id="ting1"></button></td>
            <td><button onclick="ding(2)" id="ting2"></button></td>
            <td><button onclick="ding(3)" id="ting3"></button>
        </tr>
        <tr>
            <td><button onclick="ding(4)" id="ting4"></button></td>
            <td><button onclick="ding(5)" id="ting5"></button></td>
            <td><button onclick="ding(6)" id="ting6"></button>
        </tr>
        <tr>
            <td><button onclick="ding(7)" id="ting7"></button></td>
            <td><button onclick="ding(8)" id="ting8"></button></td>
            <td><button onclick="ding(9)" id="ting9"></button>
        </tr>
    </table>

    <p id="ans">Player X starts the game!</p>

    <button onclick="resetGame()" style="display: block; margin: 20px auto;">Reset Game</button>
</body>

<script>
    let sep = 0;
    let Active = true;

    function ding(num) {
        const button = document.getElementById("ting" + num);
        if (!Active || button.textContent !== "") {
            return;
        }
        const player = (sep % 2) === 0 ? "X" : "O";
        button.textContent = player;
        sep++;
        checkWin();
        if (Active) {
            const nextPlayer = (sep % 2) === 0 ? "X" : "O";
            document.getElementById("ans").textContent = `It's Player ${nextPlayer}'s turn.`;
        }
    }


    function checkWin() {
        const getCell = (i) => document.getElementById(`ting${i}`).textContent;
        const winLines = [
            [1, 2, 3], [4, 5, 6], [7, 8, 9], // Rows
            [1, 4, 7], [2, 5, 8], [3, 6, 9], // Columns
            [1, 5, 9], [3, 5, 7]             // Diagonals
        ];
        for (const line of winLines) {
            const [a, b, c] = line;
            const markA = getCell(a);
            if (markA && markA === getCell(b) && markA === getCell(c)) {
                document.getElementById("ans").textContent = `Player ${markA} wins!`;
                Active = false;
                return;
            }
        }
        if (sep === 9 && Active) {
            document.getElementById("ans").textContent = "Game over! The match is a tie.";
            Active = false;
        }
    }


    function resetGame() {
        sep = 0;
        Active = true;
        document.getElementById("ans").textContent = "Player X starts the game!";
        for (let i = 1; i <= 9; i++) {
            document.getElementById("ting" + i).textContent = "";
        }
    }

</script>

</html>
