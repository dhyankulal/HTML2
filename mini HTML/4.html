<!DOCTYPE html>
<html>

<head>
    <title>Simple Tic Tac Toe</title>
    <style>
        button {
            width: 60px;
            height: 60px;
            font-size: 25px;
            margin: 3px;
        }
    </style>
</head>

<body>

    <h2>Tic Tac Toe</h2>

    <button id="b1" onclick="play(1)"> </button>
    <button id="b2" onclick="play(2)"> </button>
    <button id="b3" onclick="play(3)"> </button>
    <br>
    <button id="b4" onclick="play(4)"> </button>
    <button id="b5" onclick="play(5)"> </button>
    <button id="b6" onclick="play(6)"> </button>
    <br>
    <button id="b7" onclick="play(7)"> </button>
    <button id="b8" onclick="play(8)"> </button>
    <button id="b9" onclick="play(9)"> </button>

    <h3 id="result"></h3>

    <script>
        let turn = "X";     // start with X

        function play(num) {

            let btn = document.getElementById("b" + num);

            // stop if already filled
            if (btn.textContent !== "") return;

            btn.textContent = turn;

            // change turn
            if (turn === "X") {
                turn = "O";
            } else {
                turn = "X";
            }

            checkWinner();
        }

        function checkWinner() {

            // get button values
            let b1 = document.getElementById("b1").textContent;
            let b2 = document.getElementById("b2").textContent;
            let b3 = document.getElementById("b3").textContent;
            let b4 = document.getElementById("b4").textContent;
            let b5 = document.getElementById("b5").textContent;
            let b6 = document.getElementById("b6").textContent;
            let b7 = document.getElementById("b7").textContent;
            let b8 = document.getElementById("b8").textContent;
            let b9 = document.getElementById("b9").textContent;

            // check simple win conditions
            if (b1 === b2 && b2 === b3 && b1 !== "") showWinner(b1);
            if (b4 === b5 && b5 === b6 && b4 !== "") showWinner(b4);
            if (b7 === b8 && b8 === b9 && b7 !== "") showWinner(b7);
            if (b1 === b4 && b4 === b7 && b1 !== "") showWinner(b1);
            if (b2 === b5 && b5 === b8 && b2 !== "") showWinner(b2);
            if (b3 === b6 && b6 === b9 && b3 !== "") showWinner(b3);
            if (b1 === b5 && b5 === b9 && b1 !== "") showWinner(b1);
            if (b3 === b5 && b5 === b7 && b3 !== "") showWinner(b3);
        }

        function showWinner(winner) {
            document.getElementById("result").textContent = winner + " wins!";
        }
    </script>

</body>

</html>
