<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,
        button {
            border: 4px solid black;
            height: 40px;
            width: 40px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td><button onclick="ding(1)" id="ting1"></button></td>
            <td><button onclick="ding(2)" id="ting2"></button></td>
            <td><button onclick="ding(3)" id="ting3"></button></td>
        </tr>
        <tr>
            <td><button onclick="ding(4)" id="ting4"></button></td>
            <td><button onclick="ding(5)" id="ting5"></button></td>
            <td><button onclick="ding(6)" id="ting6"></button></td>
        </tr>
        <tr>
            <td><button onclick="ding(7)" id="ting7"></button></td>
            <td><button onclick="ding(8)" id="ting8"></button></td>
            <td><button onclick="ding(9)" id="ting9"></button></td>
        </tr>
        <tr>
            <p id="ans"></p>
        </tr>
    </table>
</body>
<script>
    let sep = 0;
    let d1 = document.getElementById("ting1").textContent;
    let d2 = document.getElementById("ting2").textContent;
    let d3 = document.getElementById("ting3").textContent;
    let d4 = document.getElementById("ting4").textContent;
    let d5 = document.getElementById("ting5").textContent;
    let d6 = document.getElementById("ting6").textContent;
    let d7 = document.getElementById("ting7").textContent;
    let d8 = document.getElementById("ting8").textContent;
    let d9 = document.getElementById("ting9").textContent;
    document.getElementById("ans").textContent = "start the Game";

    function ding(num) {
        if ((sep % 2) == 0) {
            player = "x";
            sep++;
            document.getElementById("ans").textContent = "";
            ping()
        } else {
            player = "o";
            sep++;
            document.getElementById("ans").textContent = "";
            ping()
        }
        document.getElementById("ting" + num).textContent = player;
        if (sep >= 9) {
            document.getElementById("ans").textContent = "Game over! match is tie";
        }
    }
    function ping() {
        if (d1 == "x" && d2 == "x" && d3 == "x") {
            document.getElementById("ans").textContent = "";
            win()
        } else if (d4 == "x" && d5 == "x" && d6 == "x") {
            document.getElementById("ans").textContent = "";
            win()
        } else if (d7 == "x" && d8 == "x" && d9 == "x") {
            document.getElementById("ans").textContent = "";
            win()
        } else if (d1 == "o" && d2 == "o" && d3 == "o") {
            document.getElementById("ans").textContent = "";
            win()
        } else if (d4 == "o" && d5 == "o" && d6 == "o") {
            document.getElementById("ans").textContent = "";
            win()
        } else if (d7 == "o" && d8 == "o" && d9 == "o") {
            document.getElementById("ans").textContent = "";
            win()
        }
    }
    function win() {
        document.getElementById("ans").textContent = "win";
        return
    }

</script>

</html>
