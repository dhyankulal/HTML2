<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td {
            height: 30px;
            width: 30px;
            border: 4px solid black;
        }

        table {
            border: 4px solid black;
        }
    </style>
</head>

<body>
    <table id="chessboard"></table>
</body>
<script>
    let content = "";
    let count = 1;
    for (i = 0; i < 8; i++) {
        content += "<tr>";
        for (j = 0; j < 8; j++) {
            if ((j + i) % 2 == 0) {
                color = "yellow";
            } else {
                color = "green";
            }

            content += `<td style="background-color: ${color}">${count}</td>`;
            count += 1;
        }
        content += "</tr>";
    }
    document.getElementById("chessboard").innerHTML = content;

</script>

</html>
