<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="timer1">10</p>
    <script>
        let timer1 = document.getElementById("timer1");
        let count1 = 10;
        let interval1 = setInterval(function handle1() {
            count1--;
            timer1.textContent = count1;
            if (count1 == 0) {
                clearInterval(interval1);
            }
        }, 1000)
    </script>
</body>

</html>
