<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            height: 140px;
            width: 140px;
            background-color: chartreuse;
        }

        input {
            width: 200px;
            height: 20px;

        }
    </style>
</head>

<body>
    <button id="button1">submit</button>
    <p id="new1"></p>
    <div id="box1"></div>
    <script>
        let btn1 = document.getElementById("button1");

        btn1.onclick = function colorcalender() {

            let rd1 = Math.floor(Math.random() * 225);
            let gr1 = Math.floor(Math.random() * 225);
            let bl1 = Math.floor(Math.random() * 225);


            document.getElementById("box1").style.backgroundColor = `rgb(${rd1}, ${gr1}, ${bl1})`;
            document.getElementById("new1").innerHTML = `rgb(${rd1}, ${gr1}, ${bl1})`;


        }


    </script>
</body>

</html>
