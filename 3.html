<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Tricolour Flag</title>
    <style>
        .seg {
            width: 600px;
            height: 150px;
            display: flex;
            justify-content: center;
        }

        .red {
            background-color: red;
        }

        .white {
            background-color: white;
        }

        .green {
            background-color: green;
        }

        .button1 {
            width: 600px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="seg red"></div>
    <div class="seg white"><img src="ashokachakra.png" alt="Ashoka chakra"></div>
    <div class="seg green"></div>
    <div class="button1">
        <button id="id1">Play national Anthem</button>
        <audio src="National-Anthem-India.mp3" id="id2"></audio>
    </div>

    <script>
        let btn1 = document.getElementById("id1");
        let media1 = document.getElementById("id2");
        btn1.onclick = function playAnthem() {
            media1.play();
            btn1.style.display = "none";// to make the button dissapear
        };
    </script>
</body>

</html>
